<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ action }} Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card shadow-sm">
            <div class="card-body">
              <h3 class="mb-3">{{ action }} Project</h3>

              {% if messages %}
                {% for message in messages %}
                  <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                {% endfor %}
              {% endif %}

              <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                  <label class="form-label">Title</label>
                  <input type="text" name="title" class="form-control" value="{{ project.title|default:'' }}" required>
                </div>

                <div class="mb-3">
                  <label class="form-label">Description</label>
                  <textarea name="description" class="form-control" rows="4">{{ project.description|default:'' }}</textarea>
                </div>

                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label">Status</label>
                    <select name="status" class="form-select">
                      {% for key, label in project.Status.choices %}
                        <option value="{{ key }}" {% if project and project.status == key %}selected{% endif %}>{{ label }}</option>
                      {% endfor %}
                      {% if not project %}
                        {# For create view, show default options #}
                        {% for key, label in Project.Status.choices %}
                          <option value="{{ key }}" {% if key == 'Planned' %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                      {% endif %}
                    </select>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Deadline</label>
                    <input type="date" name="deadline" class="form-control" value="{{ project.deadline|date:'Y-m-d'|default:'' }}">
                  </div>
                </div>

                <div class="d-flex gap-2 mt-4">
                  <button class="btn btn-success" type="submit">Save</button>
                  <a class="btn btn-outline-secondary" href="{% url 'projects:project_list' %}">Back</a>
                </div>
              </form>

            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
