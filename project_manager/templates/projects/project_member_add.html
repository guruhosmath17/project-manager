<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Add Members</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0">Add Member: {{ project.title }}</h3>
        <a class="btn btn-outline-secondary" href="{% url 'projects:project_detail' project.id %}">Back</a>
      </div>

      <div class="card shadow-sm">
        <div class="card-body">
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
          {% endif %}

          <div class="list-group">
            {% for user in candidates %}
              <div class="list-group-item">
                <div class="d-flex justify-content-between align-items-center gap-3">
                  <div>
                    <strong>{{ user.username }}</strong>
                    <div class="text-muted small">{{ user.email }}</div>
                  </div>

                  <form method="post" class="d-flex gap-2 align-items-center" action="">
                    {% csrf_token %}
                    <input type="hidden" name="user_id" value="{{ user.id }}">
                    <select name="role" class="form-select form-select-sm" style="width: 170px;">
                      <option value="Admin">Admin</option>
                      <option value="Manager">Manager</option>
                      <option value="Developer">Developer</option>
                      <option value="Viewer" selected>Viewer</option>
                    </select>
                    <button class="btn btn-sm btn-primary" type="submit">Add</button>
                  </form>
                </div>
              </div>
            {% empty %}
              <div class="alert alert-secondary">All users are already members.</div>
            {% endfor %}
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
